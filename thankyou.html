<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank you</title>

  <link rel="stylesheet" href="css/lastpage.css" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    #playerControls {
      margin-top: 20px;
      margin-bottom: 20px;
    }
    .playPauseBtn {
      background: none;
      border: 2px solid #ff6699;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 16px;
      color: #ff6699;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .playPauseBtn:hover {
      background: #ff6699;
      color: white;
    }
    #call {
      width: 300px;
      height: 250px;
      object-fit: cover;
    }

    .page-wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      flex-wrap: nowrap;
    }

    .photo-gallery {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .photo-gallery img {
      width: 120px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      object-fit: cover;
    }

    .main-content {
      text-align: center;
    }

    .responsive {
      max-width: 100%;
      height: auto;
    }

    #thankyou {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      font-family: 'Comic Sans MS', cursive;
    }
    @keyframes heartbeat {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.3);
      }
    }

    .heart {
      display: inline-block;
      animation: heartbeat 1s infinite;
      transform-origin: center;
    }

  </style>
</head>
<body>
  <div class="page-wrapper">
    <!-- Left Photo Column -->
    <div class="photo-gallery left">
      <img src="assets/images/1.jpg" alt="Photo 1" />
      <img src="assets/images/3.jpg" alt="Photo 3" />
      <img src="assets/images/7.jpg" alt="Photo 7" />
      <img src="assets/images/9.jpg" alt="Photo 9" />
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div id="playerControls">
        <button class="playPauseBtn" id="togglePlay">Pause Song</button>
      </div>

      <h1>We're officially dating, 25 May 2025 <span class="heart">&#10084;</span></h1>
      <div style="display: flex; align-items: center; gap: 10px; justify-content: center;">
        <img id="ily" src="assets/gif/iloveyou.gif" alt="ily" class="responsive" />
        <img id="call" src="assets/gif/callme.gif" alt="call" class="responsive" />
      </div>
      
      <div style="margin-top: 15px;">
        <span class="heart">&#10084;&#10084;&#10084;</span>
        <p id="thankyou" style="font-size: 25px; margin: 0;">
          &nbsp;Love you, riza acu&nbsp;
        </p>
        <span class="heart">&#10084;&#10084;&#10084;</span>
      </div>
    </div>

    <!-- Right Photo Column -->
    <div class="photo-gallery right">
      <img src="assets/images/2.jpg" alt="Photo 2" />
      <img src="assets/images/4.jpg" alt="Photo 4" />
      <img src="assets/images/6.jpg" alt="Photo 6" />
      <img src="assets/images/8.jpg" alt="Photo 8" />
    </div>
  </div>

  <!-- Hidden audio -->
  <audio id="bgMusic" autoplay loop>
    <source src="assets/audio/Paul Partohap - BEAUTiFUL (Lyric Video).mp3" type="audio/mpeg" />
    Your browser does not support the audio element.
  </audio>

  <script>
    const audio = document.getElementById("bgMusic");
    const toggleBtn = document.getElementById("togglePlay");

    toggleBtn.addEventListener("click", () => {
      if (audio.paused) {
        audio.play();
        toggleBtn.textContent = "Pause Song";
      } else {
        audio.pause();
        toggleBtn.textContent = "Play Song";
      }
    });

    function launchConfetti() {
      confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.6 },
      });
    }
    setInterval(launchConfetti, 1000);
  </script>
</body>
</html>
